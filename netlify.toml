[build]
  command = "npm run build"
  publish = "dist"

# ---------------------------------------------------------------------------
# Cache headers — hashed Astro assets are immutable (content-addressed)
# ---------------------------------------------------------------------------

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Canonical domain redirect — send all Netlify subdomain traffic to production
# ---------------------------------------------------------------------------

[[redirects]]
  from = "https://formxai.netlify.app/*"
  to = "https://www.formx.ai/:splat"
  status = 301
  force = true

# /smartadapt (old Webflow path) → correct Astro page
